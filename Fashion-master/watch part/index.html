<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartWatch Store | Shop Smart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="navbar">
    <div class="logo">⌚ SmartWatch Store</div>
    <input type="text" class="search-bar" placeholder="Search smartwatches...">
    <button class="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</button>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-text">
      <h1>Smart Watches That Define Style & Innovation</h1>
      <p>Choose from our latest collection of smartwatches with advanced health tracking, AMOLED displays, and all-day comfort.</p>
      <button class="shop-btn">Shop Now</button>
    </div>
    <img src="images/watch1.png" alt="Hero Watch" class="hero-img">
  </section>

  <!-- Product Grid -->
  <section class="product-section">
    <h2>Top Selling Smartwatches</h2>
    <div class="product-grid" id="product-grid"></div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2025 SmartWatch Store. Designed by ChatGPT.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
